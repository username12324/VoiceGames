<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Lists — VoiceGames</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="games/shared/wordlists.js"></script>
<script src="games/shared/utils.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: #0f0e17;
  color: #fff;
  min-height: 100vh;
  padding: 2rem;
}
.back-btn {
  position: fixed; top: 16px; left: 16px; z-index: 50;
  display: flex; align-items: center; gap: 8px;
  background: #1a1a2e; border: 1px solid #333; color: #ccc;
  padding: 8px 16px; border-radius: 50px; font-size: 0.85em;
  font-weight: 700; text-decoration: none; transition: all 0.2s;
}
.back-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

.container { max-width: 900px; margin: 0 auto; padding-top: 3rem; }
h1 { font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 0.3rem; }
h1 em { font-style: normal; color: #ff6b6b; }
.sub { text-align: center; color: rgba(255,255,255,0.4); margin-bottom: 2.5rem; }

.topic-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px; margin-bottom: 2.5rem;
}
.topic-card {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 1.5rem 1rem;
  text-align: center; cursor: pointer; transition: all 0.2s;
}
.topic-card:hover { border-color: rgba(255,107,107,0.4); transform: translateY(-2px); }
.topic-card.active { border-color: #ff6b6b; background: rgba(255,107,107,0.1); }
.topic-emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }
.topic-name { font-weight: 900; font-size: 1.05rem; }
.topic-active-badge {
  display: none; margin-top: 6px; font-size: 0.7rem; font-weight: 900;
  color: #ff6b6b; text-transform: uppercase; letter-spacing: 1px;
}
.topic-card.active .topic-active-badge { display: block; }

.preview-section { margin-bottom: 2rem; }
.preview-title {
  font-size: 0.85rem; font-weight: 900; text-transform: uppercase;
  letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 0.8rem;
}
.preview-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
.preview-tab {
  padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer; color: rgba(255,255,255,0.6); transition: all 0.2s;
}
.preview-tab.active { background: rgba(255,107,107,0.15); border-color: #ff6b6b; color: #ff6b6b; }

.word-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.word-chip {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 8px 12px; font-size: 0.85rem;
}
.word-chip .en { font-weight: 700; }
.word-chip .ru { color: rgba(255,255,255,0.4); font-size: 0.78rem; margin-top: 2px; }

.sentence-list { display: flex; flex-direction: column; gap: 8px; }
.sentence-chip {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 10px 14px; font-size: 0.88rem;
}
.sentence-chip .en { font-weight: 700; }
.sentence-chip .ru { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-top: 2px; }
.word-chip .count, .sentence-chip .count {
  display: inline-block; margin-top: 4px; font-size: 0.7rem; font-weight: 900;
  color: #ff6b6b; text-transform: uppercase; letter-spacing: 0.5px;
}
.word-chip, .sentence-chip {
  cursor: pointer; transition: all 0.15s;
}
.word-chip:hover, .sentence-chip:hover {
  border-color: rgba(255,107,107,0.4);
}
.word-chip.speaking, .sentence-chip.speaking {
  border-color: #ff6b6b; background: rgba(255,107,107,0.12);
}
.chip-speak-icon {
  float: right; opacity: 0.4; font-size: 0.9em;
}
.word-chip.speaking .chip-speak-icon, .sentence-chip.speaking .chip-speak-icon {
  opacity: 1;
}

.game-note {
  text-align: center; color: rgba(255,255,255,0.3); font-size: 0.8rem;
  margin-top: 2rem; line-height: 1.6;
}

.topic-card { position: relative; }
.topic-card-add {
  border-style: dashed; display: flex; flex-direction: column;
  align-items: center; justify-content: center; opacity: 0.6;
}
.topic-card-add:hover { opacity: 1; border-color: #ff6b6b; }
.custom-del {
  position: absolute; top: 6px; right: 8px; width: 20px; height: 20px;
  border-radius: 50%; background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; color: rgba(255,255,255,0.4); cursor: pointer;
  transition: all 0.15s;
}
.custom-del:hover { background: #ff6b6b; color: #fff; }

.editor-overlay {
  position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.editor-overlay.open { opacity: 1; pointer-events: all; }
.editor-panel {
  background: #16151f; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 1.5rem; width: min(500px, 92vw);
  max-height: 85vh; display: flex; flex-direction: column;
}
.editor-title { font-weight: 900; font-size: 1.1rem; margin-bottom: 1rem; }
.editor-phrase-list { flex: 1; overflow-y: auto; margin-bottom: 1rem; max-height: 320px; }
.editor-phrase-row {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 8px 12px; margin-bottom: 6px;
}
.editor-phrase-row .en { font-weight: 700; font-size: 0.88rem; }
.editor-phrase-row .ru { color: rgba(255,255,255,0.4); font-size: 0.78rem; margin-top: 2px; }
.editor-del-btn {
  background: none; border: none; color: rgba(255,255,255,0.3);
  cursor: pointer; font-size: 1rem; padding: 4px 8px; flex-shrink: 0;
}
.editor-del-btn:hover { color: #ff6b6b; }

.editor-add-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
.editor-add-row input {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 10px 14px; color: #fff; font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
}
.editor-add-row input:focus { outline: none; border-color: #ff6b6b; }
.editor-add-btn {
  background: #ff6b6b; color: #fff; border: none; border-radius: 10px;
  padding: 10px; font-weight: 900; font-size: 0.85rem; cursor: pointer;
}
.editor-add-btn:hover { background: #e05555; }
.editor-close-btn {
  background: rgba(255,255,255,0.08); color: #fff; border: none;
  border-radius: 10px; padding: 10px; font-weight: 700; font-size: 0.85rem;
  cursor: pointer;
}
.editor-close-btn:hover { background: rgba(255,255,255,0.14); }
</style>
</head>
<body>

<a href="play.html" class="back-btn">← Menu</a>

<div class="container">
  <h1>📚 Word <em>Lists</em></h1>
  <div class="sub">Pick a topic — it applies to Heroes, Voice Angler, and Spell Match-3</div>

  <div class="topic-grid" id="topicGrid"></div>

  <div class="preview-section">
    <div class="preview-title">Preview — Sentences</div>
    <div id="previewContent"></div>
  </div>

  <div class="game-note">
    Changing the topic here updates the vocabulary used across Heroes of Voice and Magic,<br>
    Voice Angler, and Spell Match-3 the next time you open those games.
  </div>
</div>

<div class="editor-overlay" id="editorOverlay">
  <div class="editor-panel">
    <div class="editor-title" id="editorTitle">Editing list</div>
    <div class="editor-phrase-list" id="editorPhraseList"></div>
    <div class="editor-add-row">
      <input type="text" id="editorEnInput" placeholder="English phrase (e.g. 'the dog runs fast')">
      <input type="text" id="editorRuInput" placeholder="Russian translation (optional)" onkeydown="if(event.key==='Enter')addPhraseFromEditor()">
      <button class="editor-add-btn" onclick="addPhraseFromEditor()">+ Add Phrase</button>
    </div>
    <button class="editor-close-btn" onclick="closeEditor()">Done</button>
  </div>
</div>

<script>
function renderTopicGrid() {
  const grid = document.getElementById('topicGrid');
  const selected = vgGetSelectedTopic();
  grid.innerHTML = '';

  const allTopics = vgGetAllTopics();
  const customIds = new Set(vgLoadCustomTopics().map(t => t.id));

  allTopics.forEach(topic => {
    const isCustom = customIds.has(topic.id);
    const card = document.createElement('div');
    card.className = 'topic-card' + (topic.id === selected ? ' active' : '');
    card.innerHTML = `
      ${isCustom ? '<div class="custom-del" title="Delete this list">✕</div>' : ''}
      <div class="topic-emoji">${topic.emoji}</div>
      <div class="topic-name">${topic.name}</div>
      <div class="topic-active-badge">✓ Selected</div>
    `;
    card.onclick = (e) => {
      if (e.target.classList.contains('custom-del')) return; // handled separately below
      vgSetSelectedTopic(topic.id);
      renderTopicGrid();
      renderPreview();
    };
    if (isCustom) {
      card.ondblclick = (e) => {
        if (e.target.classList.contains('custom-del')) return;
        openEditor(topic.id);
      };
      card.title = 'Click to select, double-click to edit phrases';
    }
    if (isCustom) {
      const delBtn = card.querySelector('.custom-del');
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (!confirm(`Delete "${topic.name}"? This can't be undone.`)) return;
        vgDeleteCustomTopic(topic.id);
        if (vgGetSelectedTopic() === topic.id) vgSetSelectedTopic('fantasy');
        renderTopicGrid();
        renderPreview();
      };
    }
    grid.appendChild(card);
  });

  // "+ New List" card, always last
  const addCard = document.createElement('div');
  addCard.className = 'topic-card topic-card-add';
  addCard.innerHTML = `
    <div class="topic-emoji">➕</div>
    <div class="topic-name">New List</div>
  `;
  addCard.onclick = () => openCreateListModal();
  grid.appendChild(addCard);
}

// ── CUSTOM LIST EDITOR ──────────────────────────────────────────
let editingTopicId = null;

function openCreateListModal() {
  const name = prompt('Name your word list (e.g. "My Family Words"):');
  if (!name || !name.trim()) return;
  const emoji = prompt('Pick an emoji for it (optional):', '📝') || '📝';
  const topic = vgCreateCustomTopic(name.trim(), emoji.trim());
  editingTopicId = topic.id;
  renderTopicGrid();
  openEditor(topic.id);
}

function openEditor(topicId) {
  editingTopicId = topicId;
  const topic = vgGetTopic(topicId);
  document.getElementById('editorTitle').textContent = `${topic.emoji} Editing: ${topic.name}`;
  renderEditorPhrases();
  document.getElementById('editorOverlay').classList.add('open');
}

function closeEditor() {
  document.getElementById('editorOverlay').classList.remove('open');
  editingTopicId = null;
  renderTopicGrid();
  renderPreview();
}

function renderEditorPhrases() {
  const topic = vgGetTopic(editingTopicId);
  const list = document.getElementById('editorPhraseList');
  if (!topic.sentences.length) {
    list.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:0.85rem;padding:1rem 0;text-align:center">No phrases yet — add one below.</div>';
    return;
  }
  list.innerHTML = topic.sentences.map((s, i) => `
    <div class="editor-phrase-row">
      <div>
        <div class="en">${s.text}</div>
        <div class="ru">${s.ru || '(no translation)'}</div>
      </div>
      <button class="editor-del-btn" data-idx="${i}">✕</button>
    </div>
  `).join('');
  list.querySelectorAll('.editor-del-btn').forEach(btn => {
    btn.onclick = () => {
      vgRemovePhraseFromTopic(editingTopicId, parseInt(btn.dataset.idx));
      renderEditorPhrases();
    };
  });
}

function addPhraseFromEditor() {
  const enInput = document.getElementById('editorEnInput');
  const ruInput = document.getElementById('editorRuInput');
  const text = enInput.value.trim();
  const ru = ruInput.value.trim();
  if (!text) { enInput.focus(); return; }
  vgAddPhraseToTopic(editingTopicId, text, ru);
  enInput.value = '';
  ruInput.value = '';
  enInput.focus();
  renderEditorPhrases();
}

function speakEnglishChip(text, chipEl) {
  document.querySelectorAll('.word-chip.speaking, .sentence-chip.speaking')
    .forEach(el => el.classList.remove('speaking'));
  chipEl.classList.add('speaking');

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.onend = () => chipEl.classList.remove('speaking');
  utt.onerror = () => chipEl.classList.remove('speaking');
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

function renderPreview() {
  const selected = vgGetSelectedTopic();
  const topic = vgGetTopic(selected);
  const container = document.getElementById('previewContent');
  const counts = (window.VG && typeof VG.getWordCounts === 'function') ? VG.getWordCounts(selected) : {};

  container.innerHTML = `<div class="sentence-list">${topic.sentences.map((s, i) => `
    <div class="sentence-chip" data-idx="${i}" title="Click to hear pronunciation">
      <span class="chip-speak-icon">🔊</span>
      <div class="en">${s.text}</div>
      <div class="ru">${s.ru}</div>
      <div class="count">Said ${counts[s.text] || 0}×</div>
    </div>
  `).join('')}</div>`;
  container.querySelectorAll('.sentence-chip').forEach((chip, i) => {
    chip.onclick = () => speakEnglishChip(topic.sentences[i].text, chip);
  });
}

renderTopicGrid();
renderPreview();
</script>

</body>
</html>
