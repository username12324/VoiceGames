<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picture Sentence</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0f0e17;
  font-family:'Nunito',sans-serif;
  color:#fff;
  min-height:100vh;
  display:flex; justify-content:center; align-items:flex-start;
  padding:20px 10px;
}
.loading-overlay{
  position:fixed; inset:0; background:#0f0e17; z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px;
  transition:opacity 0.35s ease;
}
.loading-overlay.hide{ opacity:0; pointer-events:none; }
.loading-spinner{
  width:46px; height:46px; border-radius:50%;
  border:4px solid rgba(77,208,225,0.18); border-top-color:#4dd0e1;
  animation:spin 0.8s linear infinite;
}
.loading-text{
  font-family:'Nunito',sans-serif; font-weight:700; font-size:0.95em;
  color:rgba(255,255,255,0.4);
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.menu-btn{
  position:fixed; top:14px; left:14px; z-index:50;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  color:#fff; font-family:'Nunito',sans-serif; font-weight:900; font-size:0.85rem;
  padding:0.55rem 1rem; border-radius:50px; cursor:pointer; text-decoration:none;
  display:inline-flex; align-items:center; gap:6px;
}
.menu-btn:hover{ background:rgba(255,255,255,0.16); }

.wrapper{ width:100%; max-width:640px; }

.header{ text-align:center; margin:10px 0 18px; }
.header h1{ font-size:1.6em; font-weight:900; }
.header h1 span{ color:#4dd0e1; }
.header p{ color:rgba(255,255,255,0.5); font-size:0.85em; margin-top:4px; }

.level-tag{
  text-align:center; margin-bottom:14px;
  color:rgba(255,255,255,0.4); font-weight:700; font-size:0.85em;
  letter-spacing:0.06em; text-transform:uppercase;
}
.level-tag b{ color:#4dd0e1; }

.card{
  background:#181729; border-radius:24px; overflow:hidden;
  box-shadow:0 0 50px rgba(77,208,225,0.12);
  transition:box-shadow 0.3s;
}
.card.correct{ box-shadow:0 0 60px rgba(126,231,135,0.35); }
.card.wrong{ box-shadow:0 0 60px rgba(255,90,90,0.35); }

.picture-wrap{ position:relative; width:100%; aspect-ratio:16/10; overflow:hidden; background:#000; }
.picture-wrap img{ width:100%; height:100%; object-fit:cover; display:block; }

.body{ padding:22px 22px 26px; }

.hint-label{
  font-size:0.7em; letter-spacing:0.08em; text-transform:uppercase;
  color:rgba(255,255,255,0.35); font-weight:700; margin-bottom:8px;
}

.tile-row{
  display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px;
}
.tile{
  background:#23223d; border:2px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.85); font-weight:900; font-size:1.05em;
  padding:0.6rem 1.05rem; border-radius:14px;
  user-select:none; pointer-events:none;
}

.hint-box{
  background:rgba(255,255,255,0.04); border-radius:12px; padding:10px 14px;
  margin-bottom:20px; font-size:0.95em; color:rgba(255,255,255,0.6);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.hint-box b{ color:#ffd166; }
.hint-replay-btn{
  flex-shrink:0; background:rgba(255,209,102,0.15); border:1px solid rgba(255,209,102,0.35);
  color:#ffd166; font-size:1.1em; width:34px; height:34px; border-radius:50%;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s, transform 0.15s;
}
.hint-replay-btn:hover{ background:rgba(255,209,102,0.28); transform:scale(1.08); }
.hint-replay-btn:active{ transform:scale(0.95); }

.heard-box{
  min-height:2.6em; border-radius:14px; padding:12px 16px; margin-bottom:18px;
  font-size:1.05em; font-weight:700; display:flex; flex-direction:column;
  justify-content:center; gap:6px;
  background:rgba(255,255,255,0.04); border:2px solid transparent;
  color:rgba(255,255,255,0.4);
  transition:background 0.25s, border-color 0.25s, color 0.25s;
}
.heard-box.correct{ background:rgba(126,231,135,0.12); border-color:#7ee787; }
.heard-box.wrong{ background:rgba(255,90,90,0.12); border-color:#ff5a5a; }

.heard-said{ font-size:0.85em; font-weight:600; opacity:0.6; }
.heard-sentence{ font-size:1.05em; }
.heard-sentence .word-ok{ color:#7ee787; }
.heard-sentence .word-bad{
  color:#ff8a8a; text-decoration:underline; text-decoration-color:#ff5a5a;
  text-decoration-thickness:2px;
}

.controls{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.btn{
  font-family:'Nunito',sans-serif; font-weight:900; font-size:0.95em;
  padding:0.75rem 1.5rem; border-radius:50px; border:none; cursor:pointer;
}
.btn-mic{
  background:#4dd0e1; color:#0f0e17; display:inline-flex; align-items:center; gap:8px;
  box-shadow:0 0 30px rgba(77,208,225,0.3);
}
.btn-mic.listening{ background:#ef5da8; box-shadow:0 0 30px rgba(239,93,168,0.4); animation:pulse 1.2s infinite; }
.btn-mic:disabled{ opacity:0.4; cursor:not-allowed; box-shadow:none; }
.btn-next{
  background:#7ee787; color:#0f0e17; display:none;
  box-shadow:0 0 30px rgba(126,231,135,0.35);
}
.btn-next.show{ display:inline-flex; align-items:center; gap:8px; }
@keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }

.status{ margin-top:14px; font-size:0.85em; min-height:1.4em; font-weight:700; color:rgba(255,255,255,0.35); }
</style>
  <script src="../shared/utils.js"></script>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading game...</div>
</div>

<a href="../../play.html" class="menu-btn">← Menu</a>


<div class="wrapper">
  <div class="header">
    <h1>🖼️ Picture <span>Sentence</span></h1>
    <p>Look at the picture and say the sentence out loud!</p>
  </div>

  <div class="level-tag">Level <b id="levelNum">1</b> &nbsp;·&nbsp; Score: <b id="scoreNum">0</b></div>

  <div class="card" id="gameCard">
    <div class="picture-wrap">
      <img id="sceneImg" src="" alt="Scene">
    </div>
    <div class="body">
      <div class="hint-label">The words you'll need (in the wrong order)</div>
      <div class="tile-row" id="tileRow"></div>

      <div class="hint-box">
        <span>🇷🇺 Hint: <b id="hintText"></b></span>
        <button class="hint-replay-btn" id="hintReplayBtn" title="Hear it again" aria-label="Hear hint again">🔊</button>
      </div>

      <div class="heard-box" id="heardBox">Press the mic and say the sentence...</div>

      <div class="controls">
        <button class="btn btn-mic" id="micBtn">🎤 Say it out loud</button>
        <button class="btn btn-next" id="nextBtn">Next Level →</button>
      </div>
      <div class="status" id="statusText"></div>
    </div>
  </div>
</div>

    if(saved && typeof saved.level === "number" && saved.level >= 0 && saved.level < LEVELS.length) return saved.level;
  } catch(e){}
  return 0;
}

function loadSavedScore(){
  try{
    const saved = JSON.parse(localStorage.getItem(SCORE_KEY));
    if(saved && typeof saved.score === "number") return saved.score;
  } catch(e){}
  return 0;
}

let score = loadSavedScore();
let levelAttempts = 0;
const scoreNum = document.getElementById("scoreNum");

function updateScoreDisplay(){
  scoreNum.textContent = score;
}

function saveScore(){
  try{
    localStorage.setItem(SCORE_KEY, JSON.stringify({ score }));
  } catch(e){}
}

function addScore(points){
  score += points;
  updateScoreDisplay();
  saveScore();
  if (window.VG) window.VG.saveScore('picture-sentence', score);
}

let currentLevel = 0;
let levelSolved = false;

const sceneImg = document.getElementById("sceneImg");
const tileRow = document.getElementById("tileRow");
const hintText = document.getElementById("hintText");
const hintReplayBtn = document.getElementById("hintReplayBtn");
const heardBox = document.getElementById("heardBox");
const statusText = document.getElementById("statusText");
const micBtn = document.getElementById("micBtn");
const nextBtn = document.getElementById("nextBtn");
const gameCard = document.getElementById("gameCard");
const levelNum = document.getElementById("levelNum");

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function loadLevel(i){
  currentLevel = i;
  levelSolved = false;
  levelAttempts = 0;
  const lvl = LEVELS[i];

  levelNum.textContent = i + 1;
  if(lvl.image){
    sceneImg.style.display = "";
    sceneImg.src = lvl.image;
    gameCard.querySelector(".picture-wrap").style.background = "#000";
  } else {
    sceneImg.style.display = "none";
    const wrap = gameCard.querySelector(".picture-wrap");
    wrap.style.background = "linear-gradient(135deg,#23223d,#181729)";
  }
  hintText.textContent = lvl.hint;
  saveProgress();

  let scrambled;
  do { scrambled = shuffle(lvl.words); }
  while(scrambled.join(" ") === lvl.words.join(" ") && lvl.words.length > 1);

  tileRow.innerHTML = "";
  scrambled.forEach(word => {
    const t = document.createElement("div");
    t.className = "tile";
    t.textContent = word;
    tileRow.appendChild(t);
  });

  heardBox.innerHTML = "";
  heardBox.textContent = "Press the mic and say the sentence...";
  heardBox.className = "heard-box";
  statusText.textContent = "";
  gameCard.className = "card";
  nextBtn.classList.remove("show");
  micBtn.disabled = false;

  speakRussianHint(lvl.hint);
}

function normalize(str){
  return str.toLowerCase().replace(/[^a-z0-9\s]/g, "").replace(/\s+/g, " ").trim();
}

// ---------- SOUND FEEDBACK (Web Audio API, no external files needed) ----------
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audioCtx = new AC();
  }
  return audioCtx;
}

function playTone(freq, startTime, duration, type, gainPeak){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playCorrectChime(){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const now = ctx.currentTime;
  // bright two-note rising chime
  playTone(523.25, now, 0.18, "sine", 0.25);        // C5
  playTone(783.99, now + 0.12, 0.22, "sine", 0.25);  // G5
}

function playWrongBuzz(){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const now = ctx.currentTime;
  // short, soft low buzz — not harsh, just a clear "not yet" cue
  playTone(180, now, 0.22, "sawtooth", 0.12);
}

// ---------- RUSSIAN TTS (reads the hint sentence aloud on level load) ----------
function speakRussianHint(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel(); // stop anything already playing
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ru-RU";
  utter.rate = 0.95;
  // Disable mic while TTS is playing so it can't hear itself
  micBtn.disabled = true;
  statusText.textContent = "🔊 Listen...";
  utter.onend = () => {
    if(!levelSolved){
      micBtn.disabled = false;
      statusText.textContent = "";
    }
  };
  window.speechSynthesis.speak(utter);
}

// ---------- SPEECH RECOGNITION (single persistent instance) ----------
let recognition = null;
let listening = false;

function initSpeech(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    micBtn.disabled = true;
    statusText.textContent = "Speech recognition isn't supported in this browser.";
    return;
  }
  recognition = new SR();
  recognition.lang = "en-US";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    listening = true;
    micBtn.classList.add("listening");
    micBtn.textContent = "🎤 Listening...";
    statusText.textContent = "Listening...";
  };

  recognition.onresult = (e) => {
    const said = e.results[0][0].transcript.trim();
    checkSpeech(said);
  };

  recognition.onerror = (e) => {
    statusText.textContent = "Didn't catch that — try again.";
  };

  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove("listening");
    micBtn.textContent = "🎤 Say it out loud";
  };
}

// Words that are okay to skip entirely if the kid doesn't say them
const SKIPPABLE_WORDS = new Set(["the", "a", "an"]);

// Common verb-form / minor variants treated as equivalent to the target word
const WORD_EQUIVALENTS = {
  "eats": ["eat", "eating"],
  "sings": ["sing", "singing"],
  "dance": ["dances", "dancing"],
};

function wordsMatch(targetWord, heardWord){
  if(targetWord === heardWord) return true;

  const variants = WORD_EQUIVALENTS[targetWord];
  if(variants && variants.includes(heardWord)) return true;

  // Fuzzy fallback: allow small differences (missing/extra letter, swapped
  // letter, wrong ending) so minor slips still count as correct.
  return isCloseEnough(targetWord, heardWord);
}

// Levenshtein edit distance between two strings.
function editDistance(a, b){
  const m = a.length, n = b.length;
  if(m === 0) return n;
  if(n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for(let i = 0; i <= m; i++) dp[i][0] = i;
  for(let j = 0; j <= n; j++) dp[0][j] = j;
  for(let i = 1; i <= m; i++){
    for(let j = 1; j <= n; j++){
      if(a[i-1] === b[j-1]){
        dp[i][j] = dp[i-1][j-1];
      } else {
        dp[i][j] = 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      }
    }
  }
  return dp[m][n];
}

// A word counts as "close enough" if the edit distance is small relative
// to its length — short words need to be near-exact, longer words tolerate
// a bit more (covers verb endings, plurals, small mishears).
function isCloseEnough(target, heard){
  if(!target || !heard) return false;
  const dist = editDistance(target, heard);
  const maxLen = Math.max(target.length, heard.length);
  if(maxLen <= 3) return dist === 0;       // tiny words must be exact ("a", "in")
  if(maxLen <= 5) return dist <= 1;        // e.g. "eats" vs "eat", "eat" vs "eats"
  return dist <= 2;                        // longer words tolerate a bit more
}

// Aligns the heard words against the target words.
// Returns:
//   passed: bool
//   heardMarkup: [{word, ok}] — built from what was actually SAID (for showing on failure)
function alignSpeech(targetWords, heardWords){
  const heardMarkup = heardWords.map(w => ({ word: w, ok: false }));
  let h = 0;
  let coreWordsTotal = 0;
  let coreWordsHit = 0;

  for(let t = 0; t < targetWords.length; t++){
    const tw = targetWords[t];
    const isSkippable = SKIPPABLE_WORDS.has(tw);
    const matchesHere = h < heardWords.length && wordsMatch(tw, heardWords[h]);

    if(matchesHere){
      heardMarkup[h].ok = true;
      h++;
      if(!isSkippable){ coreWordsTotal++; coreWordsHit++; }
      continue;
    }

    if(isSkippable){
      // didn't say it, that's fine — don't consume a heard word, don't fail
      continue;
    }

    // core word missing or wrong at this position
    coreWordsTotal++;

    // try to resync: if the next heard word actually matches a LATER target
    // word, then the current heard word (if any) was just an extra/wrong
    // word — mark it bad and consume it; otherwise leave pointer as-is
    if(h < heardWords.length){
      const matchesLater = targetWords.slice(t + 1).some(future => wordsMatch(future, heardWords[h]));
      if(!matchesLater){
        heardMarkup[h].ok = false;
        h++;
      }
    }
  }

  // any leftover heard words past what the target needed are extra/wrong
  for(let i = h; i < heardWords.length; i++){
    heardMarkup[i].ok = false;
  }

  const passed = coreWordsTotal > 0 && coreWordsHit === coreWordsTotal;
  return { passed, heardMarkup };
}

function checkSpeech(said){
  const targetWords = LEVELS[currentLevel].words.map(w => normalize(w)).filter(Boolean);
  const heardWords = normalize(said).split(" ").filter(Boolean);

  const { passed, heardMarkup } = alignSpeech(targetWords, heardWords);

  if(passed){
    renderHeardCorrect(said);
    onCorrect();
  } else {
    renderHeardWrong(heardMarkup);
    onWrong();
  }
}

function renderHeardCorrect(rawSaid){
  heardBox.innerHTML = "";
  const label = document.createElement("div");
  label.className = "heard-said";
  label.textContent = 'You said: "' + rawSaid + '"';
  heardBox.appendChild(label);
}

// Shows ONLY what the kid said, marking wrong/missing-context words red.
// Never reveals the target sentence.
function renderHeardWrong(heardMarkup){
  heardBox.innerHTML = "";

  if(heardMarkup.length === 0){
    const empty = document.createElement("div");
    empty.className = "heard-sentence";
    empty.textContent = "(didn't catch anything — try again)";
    heardBox.appendChild(empty);
    return;
  }

  const sentenceLine = document.createElement("div");
  sentenceLine.className = "heard-sentence";
  heardMarkup.forEach((item, idx) => {
    const span = document.createElement("span");
    span.textContent = item.word;
    span.className = item.ok ? "word-ok" : "word-bad";
    sentenceLine.appendChild(span);
    if(idx < heardMarkup.length - 1){
      sentenceLine.appendChild(document.createTextNode(" "));
    }
  });
  heardBox.appendChild(sentenceLine);
}

function onCorrect(){
  levelSolved = true;
  playCorrectChime();
  heardBox.classList.remove("wrong");
  heardBox.classList.add("correct");
  gameCard.classList.remove("wrong");
  gameCard.classList.add("correct");
  const firstTry = levelAttempts === 0;
  addScore(firstTry ? 15 : 10);
  statusText.textContent = firstTry ? "Correct! 🎉 +15" : "Correct! 🎉 +10";
  nextBtn.classList.add("show");
  micBtn.disabled = true;
}

function onWrong(){
  levelAttempts++;
  playWrongBuzz();
  heardBox.classList.remove("correct");
  heardBox.classList.add("wrong");
  gameCard.classList.remove("correct");
  gameCard.classList.add("wrong");
  statusText.textContent = "Not quite — try again!";

  // reset shortly after so they can retry; the wrong attempt doesn't linger
  // and the answer is never shown
  setTimeout(() => {
    if(levelSolved) return; // safety: don't reset if a fast correct retry already passed
    heardBox.innerHTML = "";
    heardBox.className = "heard-box";
    heardBox.textContent = "Press the mic and say the sentence...";
    statusText.textContent = "";
  }, 1600);
}

micBtn.onclick = () => {
  if(!recognition || listening || levelSolved) return;
  try{ recognition.start(); } catch(e){ /* ignore if already starting */ }
};

hintReplayBtn.onclick = () => {
  speakRussianHint(LEVELS[currentLevel].hint);
};

nextBtn.onclick = () => {
  const isLast = currentLevel === LEVELS.length - 1;
  if(isLast){
    loadLevel(0);
  } else {
    loadLevel(currentLevel + 1);
  }
};

// ---------- INIT ----------
initSpeech();
updateScoreDisplay();
loadLevel(loadSavedLevelIndex());

const loadingOverlay = document.getElementById("loadingOverlay");
if(loadingOverlay){
  loadingOverlay.classList.add("hide");
  setTimeout(() => loadingOverlay.remove(), 400);
}
</script>
